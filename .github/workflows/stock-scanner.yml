name: Stock Scanner Daily

on:
  schedule:
    # GitHub בודק כל 5 דקות
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: stock-scanner-daily
  cancel-in-progress: false

jobs:
  run-stock-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      # שעה לבדיקה עכשיו: 12:40 שעון ישראל
      TARGET_HOUR_ISRAEL: "12"
      TARGET_MINUTE_ISRAEL: "40"
      RUN_WINDOW_MINUTES: "15"

      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
      TO_EMAILS: ${{ secrets.TO_EMAILS }}

    steps:
      - name: Check Israel time
        id: timecheck
        run: |
          ISRAEL_HOUR=$(TZ="Asia/Jerusalem" date +%H)
          ISRAEL_MINUTE=$(TZ="Asia/Jerusalem" date +%M)

          echo "Israel time now: $ISRAEL_HOUR:$ISRAEL_MINUTE"
          echo "Target time: $TARGET_HOUR_ISRAEL:$TARGET_MINUTE_ISRAEL"
          echo "Run window minutes: $RUN_WINDOW_MINUTES"

          CURRENT_TOTAL=$((10#$ISRAEL_HOUR * 60 + 10#$ISRAEL_MINUTE))
          TARGET_TOTAL=$((10#$TARGET_HOUR_ISRAEL * 60 + 10#$TARGET_MINUTE_ISRAEL))
          WINDOW_END=$((TARGET_TOTAL + RUN_WINDOW_MINUTES))

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — bypassing time check"
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_TOTAL" -ge "$TARGET_TOTAL" ] && [ "$CURRENT_TOTAL" -lt "$WINDOW_END" ]; then
            echo "Inside target window — running scanner"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Outside target window — skipping scanner"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Restore scanner state
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: |
            performance_log.csv
            progress.json
            alerts_sent.json
            signals_log.csv
            twelvedata_blocklist.json
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-

      - name: Set up Python
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.timecheck.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stock scanner
        if: steps.timecheck.outputs.should_run == 'true'
        run: python stock_scanner_unified.py

      - name: Skip message
        if: steps.timecheck.outputs.should_run == 'false'
        run: echo "Not inside target time window in Israel. Skipping scanner."
