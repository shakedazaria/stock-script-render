name: Stock Scanner Daily

on:
  schedule:
    # GitHub בודק כל 5 דקות
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: stock-scanner-daily
  cancel-in-progress: false

jobs:
  run-stock-scanner:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      contents: write

    env:
      # חלון ריצה לפי שעון ישראל:
      # מ-05:00 בבוקר עד 09:59
      START_HOUR_ISRAEL: "05"
      END_HOUR_ISRAEL: "10"

      FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      TWELVEDATA_API_KEYS: ${{ secrets.TWELVEDATA_API_KEYS }}
      TO_EMAILS: ${{ secrets.TO_EMAILS }}

      # תיקיית הזיכרון של הסורק
      STATE_DIR: "scanner_state"

      # הגדרות יציבות כדי לא להיחסם מהר
      PREFILTER_BATCH_SIZE: "50"
      PREFILTER_DOWNLOAD_RETRIES: "3"
      PREFILTER_TIMEOUT_SECONDS: "20"
      PREFILTER_RETRY_SLEEP_SECONDS: "10"
      SCAN_DELAY_SECONDS: "3"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Check Israel time and daily run
        id: timecheck
        run: |
          mkdir -p scanner_state

          ISRAEL_DATE=$(TZ="Asia/Jerusalem" date +%F)
          ISRAEL_HOUR=$(TZ="Asia/Jerusalem" date +%H)
          ISRAEL_MINUTE=$(TZ="Asia/Jerusalem" date +%M)

          echo "Israel time now: $ISRAEL_DATE $ISRAEL_HOUR:$ISRAEL_MINUTE"
          echo "Allowed window: $START_HOUR_ISRAEL:00 - $END_HOUR_ISRAEL:00"

          LAST_RUN=""
          if [ -f scanner_state/last_run_date.txt ]; then
            LAST_RUN=$(cat scanner_state/last_run_date.txt)
          fi

          echo "Last run date: $LAST_RUN"

          CURRENT_TOTAL=$((10#$ISRAEL_HOUR * 60 + 10#$ISRAEL_MINUTE))
          START_TOTAL=$((10#$START_HOUR_ISRAEL * 60))
          END_TOTAL=$((10#$END_HOUR_ISRAEL * 60))

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — bypassing time check"
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "$LAST_RUN" = "$ISRAEL_DATE" ]; then
            echo "Already ran today — skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_TOTAL" -ge "$START_TOTAL" ] && [ "$CURRENT_TOTAL" -lt "$END_TOTAL" ]; then
            echo "Inside morning window and not run today — running scanner"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Outside morning window — skipping scanner"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Restore scanner state
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: scanner_state
          key: scanner-state-${{ github.run_id }}
          restore-keys: |
            scanner-state-

      - name: Set up Python
        if: steps.timecheck.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.timecheck.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make sure state folder exists
        if: steps.timecheck.outputs.should_run == 'true'
        run: mkdir -p scanner_state

      - name: Run stock scanner
        if: steps.timecheck.outputs.should_run == 'true'
        run: python stock_scanner_unified.py

      - name: Mark daily run completed
        if: steps.timecheck.outputs.should_run == 'true' && success()
        run: |
          mkdir -p scanner_state
          TZ="Asia/Jerusalem" date +%F > scanner_state/last_run_date.txt

      - name: Commit scanner state to repository
        if: steps.timecheck.outputs.should_run == 'true' && always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase || true

          git add scanner_state/

          if git diff --cached --quiet; then
            echo "No scanner state changes"
          else
            git commit -m "Update scanner state"
            git push
          fi

      - name: Save scanner state cache
        if: steps.timecheck.outputs.should_run == 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: scanner_state
          key: scanner-state-${{ github.run_id }}

      - name: Upload scanner state artifact
        if: steps.timecheck.outputs.should_run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-state
          path: scanner_state
          retention-days: 90

      - name: Skip message
        if: steps.timecheck.outputs.should_run == 'false'
        run: echo "Not running scanner now."
